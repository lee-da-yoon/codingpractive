<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <button class ="home-btn">ganadaramabasa</button>

        <div>
            <a href="page1.html" class="nav-btn">1</a>
            <a href="page2.html" class="nav-btn">2</a>
            <a href="page3.html" class="nav-btn">3</a>
        </div>

    </header>

    <section class="banner-container">

        <div class="slider-wrapper">
            <img src="picture1.jpg" alt="Slide 1" class="slide active">
            <img src="picture2.png" alt="Slide 2" class="slide">
            <img src="picture3.jpg" alt="Slide 3" class="slide">
            <img src="picture4.jpg" alt="Slide 4" class="slide">
            <img src="images/picture5.jpg" alt="Slide 5" class="slide">
        </div>
        
        <button class="arrow prev" onclick="moveSlide(-1)">&#10094;</button>
        <button class="arrow next" onclick="moveSlide(1)">&#10095;</button>

        <div class="dots-container">
            <span class="dot active" onclick="bannerdot(1)"></span>
            <span class="dot" onclick="bannerdot(2)"></span>
            <span class="dot" onclick="bannerdot(3)"></span>
            <span class="dot" onclick="bannerdot(4)"></span>
            <span class="dot" onclick="bannerdot(5)"></span>
        </div>

    </section>


    <script src="script.js"></script>
</body>
</html>
